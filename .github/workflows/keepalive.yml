name: Keep alive
# Render 무료 서버는 15분 인바운드 요청이 없으면 잠든다. 외부에서 주기적으로 깨운다.
# GitHub 크론은 지연이 잦으니, 안정적인 상시 유지는 UptimeRobot/cron-job.org 권장(docs/DEPLOY.md).
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          if [ -z "${{ vars.PING_URL }}" ]; then
            echo "PING_URL 미설정 — 배포 후 리포지토리 Settings → Variables 에 PING_URL(배포 주소) 추가"
            exit 0
          fi
          curl -fsS "${{ vars.PING_URL }}/healthz" && echo " OK" || echo "ping 실패(일시적일 수 있음)"
